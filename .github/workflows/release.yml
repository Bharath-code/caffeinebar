name: Build, Sign & Notarize
on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: macos-14
    env:
      SCHEME: CaffeineBar
      PRODUCT_NAME: CaffeineBar
      ARCHIVE_PATH: build/CaffeineBar.xcarchive
      APP_PATH: build/CaffeineBar.app
      DMG_PATH: build/CaffeineBar.dmg

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Create a temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(uuidgen)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          echo -n "$APPLE_CERTIFICATE_P12" | base64 --decode -o "$CERT_PATH"
          security import "$CERT_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Allow codesign to access the keychain
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Resolve Swift packages
        working-directory: CaffeineBar
        run: xcodebuild -resolvePackageDependencies -scheme "$SCHEME"

      - name: Build archive with Hardened Runtime
        working-directory: CaffeineBar
        run: |
          xcodebuild archive \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "../$ARCHIVE_PATH" \
            CODE_SIGN_IDENTITY="${{ secrets.DEVELOPER_ID_APPLICATION }}" \
            OTHER_CODE_SIGN_FLAGS="--options=runtime" \
            ENABLE_HARDENED_RUNTIME=YES

      - name: Export app from archive
        run: |
          mkdir -p build
          cp -R "$ARCHIVE_PATH/Products/usr/local/bin/$PRODUCT_NAME.app" "$APP_PATH" 2>/dev/null || \
          cp -R "$ARCHIVE_PATH/Products/Applications/$PRODUCT_NAME.app" "$APP_PATH" 2>/dev/null || \
          cp -R "$(find "$ARCHIVE_PATH" -name "*.app" -type d | head -1)" "$APP_PATH"

      - name: Code-sign app with Hardened Runtime
        run: |
          codesign --deep --force --options runtime \
            --sign "${{ secrets.DEVELOPER_ID_APPLICATION }}" \
            --entitlements CaffeineBar/CaffeineBar.entitlements \
            "$APP_PATH"

      - name: Create DMG
        run: |
          hdiutil create -volname "$PRODUCT_NAME" \
            -srcfolder "$APP_PATH" \
            -ov -format UDZO \
            "$DMG_PATH"

      - name: Code-sign DMG
        run: |
          codesign --force --sign "${{ secrets.DEVELOPER_ID_APPLICATION }}" "$DMG_PATH"

      - name: Submit to Apple Notarization
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait \
            --output-format json > notarization_result.json

          cat notarization_result.json

      - name: Fail on non-success notarization status
        run: |
          STATUS=$(cat notarization_result.json | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','Unknown'))")
          echo "Notarization status: $STATUS"
          if [ "$STATUS" != "Accepted" ]; then
            echo "::error::Notarization failed with status: $STATUS"
            exit 1
          fi

      - name: Staple notarization ticket
        run: |
          xcrun stapler staple "$DMG_PATH"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: CaffeineBar.dmg
          path: build/CaffeineBar.dmg

      - name: Clean up keychain
        if: always()
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
